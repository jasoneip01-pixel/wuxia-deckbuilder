<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨隐残卷</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2A2A2A url("data:image/svg+xml,%3Csvg width='200' height='200' viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'KaiTi', 'STKaiti', 'SimSun', serif;
    }
    #game-frame {
      position: relative;
      box-shadow:
        0 0 40px rgba(0,0,0,0.5),
        0 0 80px rgba(0,0,0,0.3),
        inset 0 0 30px rgba(0,0,0,0.1);
      border: 2px solid #3C3C3C;
    }
    #game-frame::before {
      content: '';
      position: absolute;
      top: -8px; left: -8px; right: -8px; bottom: -8px;
      border: 1px solid rgba(212, 168, 67, 0.3);
      pointer-events: none;
      z-index: 10;
    }
    #game-container {
      width: 1280px;
      height: 720px;
      display: block;
    }
    /* 装饰角标 */
    #frame-corner-tl, #frame-corner-tr, #frame-corner-bl, #frame-corner-br {
      position: absolute;
      width: 30px; height: 30px;
      border-color: rgba(212, 168, 67, 0.4);
      border-style: solid;
      pointer-events: none;
      z-index: 10;
    }
    #frame-corner-tl { top: -4px; left: -4px; border-width: 2px 0 0 2px; }
    #frame-corner-tr { top: -4px; right: -4px; border-width: 2px 2px 0 0; }
    #frame-corner-bl { bottom: -4px; left: -4px; border-width: 0 0 2px 2px; }
    #frame-corner-br { bottom: -4px; right: -4px; border-width: 0 2px 2px 0; }
  </style>
  <script type="module" crossorigin src="./assets/index-rKjyKs25.js"></script>
</head>
<body>
  <div id="game-frame">
    <div id="game-container"></div>
    <div id="frame-corner-tl"></div>
    <div id="frame-corner-tr"></div>
    <div id="frame-corner-bl"></div>
    <div id="frame-corner-br"></div>
  </div>
</body>
</html>
